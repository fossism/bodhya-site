<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap" rel="stylesheet">

    <link rel="icon" href="/bodhyafavi.svg" type="image/svg+xml">

    <style>
        :root {
            /* Bodhya brand assets */
            --bg-floral: #FFF8F3;
            --accent-red: #AD544B;
            --accent-red-dark: #8f3e2e;
            --text-main: #2d2d2d;
            --nav-text: #4a4a4a;
            --font-display: 'Funnel Display', serif;
            --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            font-size: 1 rem;
            line-height: 1.7;
            color: #1a1a1a;
            background: #ffffff;
        }

        .logo img {
            width: auto;
            display: block;
            height: 3rem;
            transform: scale(1.5);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--terracotta);
            letter-spacing: -0.5px;
            text-decoration: none;
            transition: opacity 0.3s;
            font-family: var(--font-display);
        }

        .logo:hover {
            opacity: 0.85;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px; 
        }
        /* Header */
        header {
            background: #AD544B;
            border-bottom: 1px solid #f0f0f0;
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .header-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--terracotta);
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: #666;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--terracotta);
        }

        /* Terracotta theme variables (if using CSS variables or Sass) */
        :root {
            --terracotta: #AD544B;
            --terracotta-dark: #8f3e2e;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 6rem 2rem;
            background: linear-gradient(135deg, #fff7f4 0%, #faf3f0 100%);
            font-family: var(--font-display);
        }

        .hero h1 {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 1rem;
            font-weight: 800;
            letter-spacing: -1px;
            font-family: var(--font-display);
            
        }

        .hero p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 2rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            font-family: var(--font-body);
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--terracotta);
            color: white;
        }

        .btn-primary:hover {
            background: var(--terracotta-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .btn-secondary {
            background: white;
            color: var(--terracotta);
            border: 1.5px solid var(--terracotta);
        }

        .btn-secondary:hover {
            background: #fff4f0;
        }
        /* Main Content */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            font-family: var(--font-display);
        }

        h2 {
            font-size: 1.6rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            font-family: var(--font-display);
        }

        h3 {
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
            font-weight: 700;
            font-family: var(--font-display);
        }

        p {
            margin-bottom: 1.2rem;
            color: #444;
            line-height: 1.8;
        }

        ul,
        ol {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        li {
            margin-bottom: 0.8rem;
            color: #444;
        }

        a {
            color: var(--terracotta);
            text-decoration: underline;
            transition: opacity 0.3s;
        }

        a:hover {
            opacity: 0.8;
        }

        /* feature cards */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .feature-card {
            padding: 2rem;
            border-radius: 8px;
            background: #f5f5f5;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: #fff3ef;
            border: 1px #f3c2b3;
            transform: translateY(-4px);
        }

        .feature-card h3 {
            margin-top: 0;
        }

        /* hamburger button */
        .hamburger {
            display: none;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--terracotta);
        }

        /* mobile menu */
        dialog {
            margin: 0;
            margin-left: auto;
            height: 100vh;
            max-height: 100vh;
            width: 100%;
            max-width: 320px;
            border: none;
            border-radius: 16px 0 0 16px; /*rounded*/
            background-color: #AD544B;
            color: #1a1a1a;
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
            padding: 0;
            overflow: hidden;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
        }

        /* Animation for opening */
        dialog[open] {
            animation: slide-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Backdrop styling */
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            animation: fade-in 0.4s ease forwards;
        }

        @keyframes slide-in {
            from {
                transform: translateX(100%);
            }

            to {
                transform: translateX(0);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .mobile-menu-content {
            padding: 2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #666;
            align-self: flex-end;
            margin-bottom: 2rem;
            padding: 0.5rem;
            line-height: 1;
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: var(--terracotta);
        }

        /* mobile nav links */
        dialog nav {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        dialog nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f0f0;
            transition: color 0.3s ease, padding-left 0.3s ease;
        }

        dialog nav a:hover {
            color: #4e0d06;
            padding-left: 10px;
        }

        @media (max-width: 768px) {

            /* hide desktop nav */
            .header-container>nav {
                display: none;
            }

            /* show hamburger */
            .hamburger {
                display: block;
            }
        }

        /* Desktop: Ensure dialog is not visible */
        @media (min-width: 769px) {
            #mobile-menu-dialog {
                display: none;
            }
        }

        /* Homepage CTA Section */
        .home-cta {
            background: #FFF8F3;
            text-align: center;
            padding: 72px 24px 48px;
            border-top: 1px solid rgba(173, 84, 75, 0.12);
        }
        .home-cta h2 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: #2D2424;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        .home-cta p {
            font-size: 1.05rem;
            color: #6D5F5F;
            max-width: 560px;
            margin: 0 auto 2rem;
            line-height: 1.7;
        }
        .home-cta-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .home-cta-btn {
            display: inline-block;
            background: #AD544B;
            color: #fff;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s ease;
        }
        .home-cta-btn:hover {
            background: #8e433c;
            color: #fff;
            text-decoration: none;
        }
        .home-cta-btn-ghost {
            display: inline-block;
            color: #AD544B;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 0.95rem;
            padding: 12px 24px;
            border-radius: 6px;
            border: 1.5px solid #AD544B;
            text-decoration: none;
            transition: background 0.2s ease, color 0.2s ease;
        }
        .home-cta-btn-ghost:hover {
            background: #AD544B;
            color: #fff;
            text-decoration: none;
        }
        /* Supported By Strip */
        .supported-by {
            background: #FFF8F3;
            text-align: center;
            padding: 24px 24px 48px;
        }
        .supported-by-label {
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6D5F5F;
            display: block;
            margin-bottom: 20px;
        }
        .supported-by-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            flex-wrap: wrap;
        }
        .supported-by-logos a {
            display: flex;
            align-items: center;
        }
        .supported-by-logos img {
            width: auto;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .supported-by-logos .logo-fossunited {
            height: 42px;
        }
        .supported-by-logos .logo-samagata {
            height: 29px;
        }
        .supported-by-logos a:hover img {
            opacity: 1;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            margin-top: 0;
        }
        .footer-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            text-align: center;
        }
        .footer-logo img {
            height: 28px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            transition: opacity 0.2s;
        }
        .footer-logo:hover img { opacity: 1; }
        .footer-nav {
            display: flex;
            gap: 8px 28px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .footer-nav a {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .footer-nav a:hover { color: #fff; }
        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            gap: 12px;
            flex-wrap: wrap;
        }
        .footer-policies {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footer-policies a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 0.78rem;
            transition: color 0.2s;
        }
        .footer-policies a:hover { color: rgba(255,255,255,0.75); }
        .footer-social {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .footer-social a {
            color: rgba(255,255,255,0.45);
            font-size: 1rem;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .footer-social a:hover { color: #fff; }
        @media (max-width: 768px) {
            .footer-bottom {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .footer-policies { justify-content: center; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            nav {
                gap: 1rem;
            }

            nav a {
                font-size: 0.85rem;
            }

            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: auto;
                min-width: 160px;
            }

            .icon-link i {
                font-size: 18px;
            }

        }
    </style>

</head>

<body>
    <header>
        <div class="header-container">
            <a href="/" class="logo">
                <img src="/bodhya-brown.svg" alt="Bodhya">
            </a>
            <nav>   
                <a href="/about">About</a>
                <a href="/join">Join</a>
                <a href="/consulting">Consulting</a>
                <a href="/projects">Projects</a>
            </nav>
            <!-- Hamburger btn for mobile -->
            <button id="mobile-menu-btn" class="hamburger" aria-label="Open mobile menu">☰</button>

            <!-- Mobile menu dialog hidden default -->
            <dialog id="mobile-menu-dialog">
                <div class="mobile-menu-content">
                    <button id="close-menu-btn" class="close-btn" aria-label="Close menu">×</button>
                    <nav>
                        <a href="/about">About</a>
                        <a href="/join">Join</a>
                        <a href="/consulting">Consulting</a>
                        <a href="/projects">Projects</a>
                    </nav>
                </div>
            </dialog>
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer>
        <div class="footer-inner">
            <a href="/" class="footer-logo" aria-label="Bodhya home">
                <img src="/bodhya-brown.svg" alt="Bodhya">
            </a>
            <nav class="footer-nav">
                <a href="/about">About</a>
                <a href="/join">Join</a>
                <a href="/consulting">Consulting</a>
                <a href="/projects">Projects</a>
                <a href="/blog">Blog</a>
                <a href="mailto:vishal@bodhya.net">Contact</a>
            </nav>
        </div>
        <div class="footer-bottom">
            <div class="footer-policies">
                <a href="/privacy-policy">Privacy Policy</a>
                <a href="/code-of-conduct">Code of Conduct</a>
                <a href="/terms-of-service">Terms of Service</a>
            </div>
            <div class="footer-social">
                <a href="https://www.linkedin.com/company/bodhya" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://www.instagram.com/joinbodhya" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://x.com/joinbodhya" aria-label="X"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://github.com/fossdot/bodhya-site" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
            </div>
        </div>
    </footer>
    <script src='/mobile-menu.js'></script>
</body>
</html>
