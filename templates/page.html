{% extends "base.html" %}

{% block title %}{{ page.title }} - {{ config.title }}{% endblock %}

{% block content %}
    <main{% if page.extra.hide_title %} style="padding:0;max-width:none;margin:0"{% endif %}>
        {% if not page.extra.hide_title %}
        <h1>{{ page.title }}</h1>
        {% endif %}
        {{ page.content | safe }}
    </main>
{% endblock %}
